name: GitHub Profile Trophy

on:
  workflow_dispatch:
  schedule:
    - cron: "30 0 * * *"

permissions:
  contents: write

jobs:
  generate:
    name: Generate trophy SVG
    runs-on: ubuntu-latest
    steps:
      - name: Checkout profile repository
        uses: actions/checkout@v4

      - name: Checkout trophy generator
        uses: actions/checkout@v4
        with:
          repository: ryo-ma/github-profile-trophy
          path: github-profile-trophy

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v1.x

      - name: Generate trophy
        working-directory: github-profile-trophy
        env:
          GITHUB_TOKEN1: ${{ github.token }}
        run: |
          deno run --allow-net --allow-env --allow-read --allow-write ./render_svg.ts Isshinfunada ../assets/github-profile-trophy.svg tokyonight

      - name: Update README trophy cache key
        run: |
          cache_key="${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          perl -0pi -e "s#assets/github-profile-trophy\\.svg(?:\\?v=[^)]*)?#assets/github-profile-trophy.svg?v=${cache_key}#g" README.md

      - name: Commit generated trophy
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update GitHub profile trophy"
          file_pattern: assets/github-profile-trophy.svg README.md
